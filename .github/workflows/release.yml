name: Release

# v로 시작하는 태그를 푸시하면(예: v0.1.0) 윈도우 설치파일을 빌드해
# GitHub Releases 에 자동으로 올린다. 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # GITHUB_TOKEN 으로 릴리즈 생성/업로드

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # release:win = npm run build(=prebuild 으로 pdfjs 자산 복사 + electron-vite build)
      #               && electron-builder --win --publish always
      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
